services:
  - type: web
    name: hoikuen-line-reminder
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_PATH
        value: /var/data/app.db
      - key: DEFAULT_FAMILY_ID
        value: fam-demo
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_DESTINATION_ID
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: CRON_JOB_ORG_API_KEY
        sync: false
      - key: CRON_JOB_PREVIOUS_ID
        sync: false
      - key: CRON_JOB_MORNING_ID
        sync: false
      - key: WEATHER_LATITUDE
        sync: false
      - key: WEATHER_LONGITUDE
        sync: false
    disks:
      - name: sqlite-data
        mountPath: /var/data
        sizeGB: 1
